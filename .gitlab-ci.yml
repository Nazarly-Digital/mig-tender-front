# Auto-deploy на push в main: GitLab Runner крутится прямо на сервере
# 178.72.129.232 как root с shell-executor'ом, поэтому запуск
# `migtender-deploy frontend` идёт без SSH'а — прямой вызов на хосте.
# Скрипт делает: cd /opt/migtender/frontend → git pull --ff-only →
# docker compose up -d --build (внутри билда: npm ci + next build).

stages:
  - deploy

deploy:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - migtender-deploy frontend
