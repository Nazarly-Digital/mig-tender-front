name: Nazarly Landing Deployment

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /var/www/mig-tender-front
            echo "▶︎ Pulling latest code..."
            git fetch --all
            git reset --hard origin/main
            echo "▶︎ Installing deps..."
            npm i
            echo "▶︎ Building..."
            npm run build
            echo "▶︎ Restarting PM2..."
            pm2 restart mig-tender-front-3007
            pm2 save
